<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeNest - Log In</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-box">

        <h2>RecipeNest</h2>
        <p class="auth-sub">Log in to your account</p>

        <div class="alert alert-error" style="display:none;" id="loginError">
            Invalid email or password. Please try again.
        </div>

        <form onsubmit="return validateLoginForm()">

            <div class="form-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" name="email" placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" name="password" placeholder="Enter your password">
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%; padding:10px;">Log In</button>

        </form>

        <div class="auth-link">
            Don't have an account? <a href="register.html">Sign up here</a>
        </div>

        <div class="auth-link" style="margin-top:8px;">
            <a href="index.html" style="color:#888; font-size:13px;">Back to Home</a>
        </div>



    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
