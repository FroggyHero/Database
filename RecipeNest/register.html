<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeNest - Sign Up</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-box" style="max-width:460px;">

        <h2>RecipeNest</h2>
        <p class="auth-sub">Create a free account</p>

        <form onsubmit="return validateRegisterForm()">

            <div class="form-group">
                <label for="regName">Full Name</label>
                <input type="text" id="regName" name="name" placeholder="Your full name">
            </div>

            <div class="form-group">
                <label for="regEmail">Email Address</label>
                <input type="email" id="regEmail" name="email" placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" name="password" placeholder="At least 6 characters">
            </div>

            <div class="form-group">
                <label for="regConfirm">Confirm Password</label>
                <input type="password" id="regConfirm" name="confirm_password" placeholder="Re-enter your password">
            </div>

            <div style="margin-bottom:18px;">
                <input type="checkbox" id="agreeTerms" name="agreeTerms">
                <label for="agreeTerms" style="font-size:13px; color:#555;">
                    I agree to the <a href="terms.html">Terms of Use</a>
                </label>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%; padding:10px;">Create Account</button>

        </form>

        <div class="auth-link">
            Already have an account? <a href="login.html">Log in here</a>
        </div>

        <div class="auth-link" style="margin-top:8px;">
            <a href="index.html" style="color:#888; font-size:13px;">Back to Home</a>
        </div>



    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
